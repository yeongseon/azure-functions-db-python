site_name: Azure Functions DB
site_description: Unified DB integration (trigger + input/output binding) for Azure Functions Python v2
site_author: Yeongseon Choe
repo_url: https://github.com/yeongseon/azure-functions-db-python
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quickstart: getting-started.md
  - User Guide:
      - Architecture: 02-architecture.md
      - Binding Semantics: 22-binding-semantics.md
      - Polling Runtime & Failure Scenarios: 24-polling-runtime-semantics.md
      - EngineProvider & Pooling: 25-engine-provider-pooling.md
      - Production Checklist — Polling Trigger: 26-polling-production-checklist.md
      - Python API Spec: 04-python-api-spec.md
      - Local Development: 09-local-dev-guide.md
  - Examples:
      - Input Binding: examples/input_binding.md
      - Output Binding: examples/output_binding.md
      - Trigger: examples/trigger.md
      - Trigger + Binding: examples/trigger_with_binding.md
      - Client Injection: examples/client_injection.md
  - API Reference: api.md
  - Contributing:
      - Guidelines: contributing.md
      - Testing: testing.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Security: security.md
  - Architecture Decision Records:
      - ADR-001 Pseudo Trigger: 16-ADR-001-pseudo-trigger-over-native.md
      - ADR-002 SQLAlchemy Adapter: 17-ADR-002-sqlalchemy-centric-adapter.md
      - ADR-003 Blob Checkpoint MVP: 18-ADR-003-blob-checkpoint-mvp.md
      - ADR-004 At-Least-Once Default: 19-ADR-004-at-least-once-default.md
      - ADR-005 Unified Package: 23-ADR-005-unified-package-design.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_signature: true
            show_root_full_path: false
            merge_init_into_class: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/azure-functions-db-python
  copyright: |
    © 2026 Yeongseon Choe – MIT Licensed
